# Security Auditor Configuration

daemon:
  scan_interval_minutes: 60
  log_level: "INFO"
  
storage:
  database_path: "data/auditor.db"
  
reporting:
  json_output_path: "data/reports/"
  
targets:
  networks:
    - "127.0.0.1/32"
    # - "192.168.1.0/24"
  hosts:
    - "localhost"

scanner:
  # Ports to scan. If full_scan is true, all 65535 ports are scanned (slower)
  full_scan: false
  common_ports:
  - 20      # FTP data transfer
  - 21      # FTP control
  - 22      # SSH / SFTP
  - 23      # Telnet
  - 25      # SMTP mail transfer
  - 53      # DNS
  - 67      # DHCP server
  - 68      # DHCP client
  - 69      # TFTP
  - 80      # HTTP web traffic
  - 88      # Kerberos authentication
  - 110     # POP3 mail retrieval
  - 111     # RPC (used by NFS)
  - 119     # NNTP
  - 123     # NTP time sync
  - 137     # NetBIOS name service
  - 138     # NetBIOS datagram
  - 139     # NetBIOS session / file sharing
  - 143     # IMAP mail retrieval
  - 161     # SNMP monitoring
  - 179     # BGP routing
  - 194     # IRC
  - 389     # LDAP directory service
  - 443     # HTTPS secure web
  - 445     # SMB Windows file sharing
  - 465     # SMTPS secure mail
  - 500     # ISAKMP / IPsec VPN
  - 514     # Syslog logging
  - 515     # Printer service
  - 520     # RIP routing
  - 548     # AFP Apple file sharing
  - 554     # RTSP streaming
  - 587     # SMTP submission
  - 631     # IPP printing
  - 636     # LDAPS secure LDAP
  - 989     # FTPS data
  - 990     # FTPS control
  - 993     # IMAPS secure mail
  - 995     # POP3S secure mail
  - 1433    # Microsoft SQL Server
  - 1434    # SQL Server Browser
  - 1521    # Oracle database
  - 2049    # NFS network storage
  - 2082    # cPanel
  - 2083    # cPanel SSL
  - 2086    # WHM
  - 2087    # WHM SSL
  - 2095    # Webmail
  - 2096    # Webmail SSL
  - 2181    # Zookeeper
  - 2222    # DirectAdmin panel
  - 2375    # Docker API
  - 2376    # Docker TLS
  - 2483    # Oracle DB SSL
  - 2484    # Oracle DB TCPS
  - 3000    # Node.js / Grafana
  - 3001    # Dev servers
  - 3306    # MySQL / MariaDB
  - 3389    # Remote Desktop (RDP)
  - 3690    # Subversion (SVN)
  - 4000    # Dev servers
  - 4222    # NATS messaging
  - 4444    # Metasploit handler / testing
  - 4567    # Sinatra dev server
  - 5000    # Flask / ASP.NET dev
  - 5001    # HTTPS dev server
  - 5432    # PostgreSQL
  - 5601    # Kibana
  - 5672    # RabbitMQ AMQP
  - 5800    # VNC web access
  - 5900    # VNC remote desktop
  - 5984    # CouchDB
  - 5985    # WinRM HTTP
  - 5986    # WinRM HTTPS
  - 6000    # X11 display server
  - 6060    # Go pprof debugging
  - 6379    # Redis cache
  - 6380    # Redis SSL
  - 6443    # Kubernetes API
  - 6667    # IRC
  - 7001    # WebLogic / Cassandra
  - 7002    # WebLogic SSL
  - 7077    # Apache Spark master
  - 7199    # Cassandra JMX
  - 7200    # Elasticsearch cluster
  - 7474    # Neo4j HTTP
  - 7687    # Neo4j Bolt
  - 8000    # Dev web server
  - 8008    # HTTP alt
  - 8009    # AJP (Tomcat)
  - 8080    # HTTP alternate / proxies
  - 8081    # Admin dashboards
  - 8086    # InfluxDB
  - 8087    # Riak
  - 8091    # Couchbase UI
  - 8161    # ActiveMQ console
  - 8200    # HashiCorp Vault
  - 8333    # Bitcoin node
  - 8443    # HTTPS alternate
  - 8500    # Consul UI/API
  - 8600    # Consul DNS
  - 8765    # WebSockets dev
  - 8888    # Jupyter Notebook
  - 9000    # SonarQube / MinIO
  - 9042    # Cassandra client
  - 9090    # Prometheus
  - 9092    # Apache Kafka
  - 9100    # Node exporter (metrics)
  - 9200    # Elasticsearch REST
  - 9418    # Git protocol
  - 9999    # Debug services
  - 10000   # Webmin admin panel
  - 11211   # Memcached
  - 15672   # RabbitMQ management UI
  - 27017   # MongoDB
  - 27018   # MongoDB shard
  - 27019   # MongoDB config
  - 28017   # MongoDB web status

capabilities:
  # Toggle specific check types
  check_unauthenticated_access: true
  check_weak_tls: true
  check_default_banners: true
