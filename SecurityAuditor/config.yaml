# Security Auditor Configuration

daemon:
  scan_interval_minutes: 60
  log_level: "INFO"
  
storage:
  database_path: "data/auditor.db"
  
reporting:
  json_output_path: "data/reports/"
  
targets:
  networks:
    - "127.0.0.1/32"
    # - "192.168.1.0/24"
  hosts:
    - "localhost"
  resume_ip: "1.1.16.179"

scanner:
  # Ports to scan. If full_scan is true, all 65535 ports are scanned (slower)
  full_scan: false
  common_ports:
  - 1433    # Microsoft SQL Server
  - 3306    # MySQL / MariaDB
  - 5432    # PostgreSQL
  - 6379    # Redis cache
  - 8080    # HTTP alternate / Jenkins
  - 27017   # MongoDB

capabilities:
  # Toggle specific check types
  check_unauthenticated_access: true
  check_weak_tls: true
  check_default_banners: true
